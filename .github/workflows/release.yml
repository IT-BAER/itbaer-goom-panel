# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Freedoom IWAD
        run: npm run fetch:freedoom

      - name: Build doom-wasm (Emscripten via Docker)
        run: npm run build:wasm

      - name: Build plugin
        run: npm run build

      - name: Resolve plugin metadata
        id: meta
        run: |
          PLUGIN_ID=$(node -p "require('./dist/plugin.json').id")
          VERSION=${GITHUB_REF_NAME#v}
          echo "id=$PLUGIN_ID"                   >> $GITHUB_OUTPUT
          echo "version=$VERSION"                >> $GITHUB_OUTPUT
          echo "zip=${PLUGIN_ID}-${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Sign plugin
        if: env.GRAFANA_ACCESS_POLICY_TOKEN != ''
        run: npm run sign

      - name: Package ZIP
        run: |
          mv dist "${{ steps.meta.outputs.id }}"
          zip -r "${{ steps.meta.outputs.zip }}" "${{ steps.meta.outputs.id }}"
          sha1sum "${{ steps.meta.outputs.zip }}" > "${{ steps.meta.outputs.zip }}.sha1"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.meta.outputs.zip }}
            ${{ steps.meta.outputs.zip }}.sha1
          generate_release_notes: true
